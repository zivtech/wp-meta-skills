name: Validate wp-meta-skills

on:
  workflow_dispatch:
  pull_request:
    paths:
      - "evals/harness/**"
      - "evals/suites/wordpress-*/**"
      - ".github/workflows/validate.yml"
      - "pytest.ini"
      - "CONTRIBUTING.md"
  push:
    branches:
      - main

concurrency:
  group: wp-validate-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  sandbox-feasibility:
    name: No-secrets Linux Docker sandbox feasibility
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions: {}
    steps:
      - name: Check out exact public commit without credentials
        run: |
          git init .
          git remote add origin "https://github.com/${GITHUB_REPOSITORY}.git"
          git -c protocol.version=2 fetch --no-tags --depth=1 origin "$GITHUB_SHA"
          git checkout --detach FETCH_HEAD
      - name: Install test dependency without cache credentials
        run: python -m pip install --no-cache-dir pytest==8.4.2
      - name: Verify committed locks, inventory, and topology policy
        run: python -m pytest evals/harness/tests/test_runtime_image_provision.py evals/harness/tests/test_wp_env_network_guard.py -q
      - name: Build and prove the exact committed runtime boundary
        run: |
          free_before=$(df --output=avail -B1 / | tail -1)
          test "$free_before" -ge 21474836480
          docker system df
          started=$SECONDS
          PYTHONPATH=evals/harness python -c 'import os,tempfile,wp_env_network_guard as g; result=g.run_linux_canary(tempfile.mkdtemp(prefix="wp-step0-parent-")+"/canary",os.environ["RUNNER_TEMP"]+"/wp-step0-result.json"); assert result["status"] == "pass", result'
          elapsed=$((SECONDS-started))
          echo "sandbox_canary_seconds=$elapsed"
          test "$elapsed" -le 1800
          free_after=$(df --output=avail -B1 / | tail -1)
          used_delta=$((free_before-free_after)); test "$used_delta" -lt 0 && used_delta=0
          echo "sandbox_post_run_disk_delta_bytes=$used_delta"
          test "$used_delta" -le 12884901888
          docker system df
          cat "$RUNNER_TEMP/wp-step0-result.json"
          { echo '```json'; cat "$RUNNER_TEMP/wp-step0-result.json"; echo '```'; } >> "$GITHUB_STEP_SUMMARY"
      - name: Remove run-scoped sandbox resources
        if: always()
        run: |
          docker ps -aq --filter 'name=wp-step0-' | xargs -r docker rm -f
          docker ps -aq --filter 'label=com.docker.compose.project' | xargs -r docker inspect --format '{{index .Config.Labels "com.docker.compose.project"}} {{.Id}}' | awk '$1 ~ /^wpstep0/ {print $2}' | xargs -r docker rm -f
          docker network ls --format '{{.Name}} {{.ID}}' | awk '$1 ~ /^wpstep0/ {print $2}' | xargs -r docker network rm
          docker image ls --format '{{.Repository}}:{{.Tag}} {{.ID}}' | awk '$1 ~ /^wp-sandbox-(wordpress|database):/ {print $2}' | sort -u | xargs -r docker image rm -f
          test -z "$(docker ps -aq --filter 'name=wp-step0-')"
          test -z "$(docker network ls --format '{{.Name}}' | awk '$1 ~ /^wpstep0/')"
          test -z "$(docker image ls --format '{{.Repository}}:{{.Tag}}' | awk '$1 ~ /^wp-sandbox-(wordpress|database):/')"
  validate:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v7

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.13"

      - name: Install validation dependencies
        run: python -m pip install --upgrade pytest pyyaml

      # ubuntu-latest ships PHP and Composer; installing the pinned toolchain
      # lets the API-existence lint gate run for real instead of skipping.
      - name: Cache Composer downloads
        uses: actions/cache@v6
        with:
          path: ~/.cache/composer/files
          key: composer-${{ hashFiles('evals/harness/php-tools/composer.lock') }}

      - name: Install pinned PHP analysis toolchain
        run: composer install --no-interaction --no-progress --working-dir evals/harness/php-tools

      - name: Verify manifest
        run: ./install.sh --verify

      - name: Validate agent/skill frontmatter and WordPress API contracts
        run: |
          python scripts/validate-agent-frontmatter.py
          python scripts/validate-wordpress-exact-api-contract.py

      - name: Validate selected WordPress eval suites
        run: |
          python scripts/validate-eval-suite-integrity.py \
            --strict-suites wordpress-plugin-executor \
            --strict-suites wordpress-block-executor \
            --strict-suites wordpress-security-critic \
            --strict-suites wordpress-performance-critic \
            --strict-suites wordpress-planner.migration \
            --strict-suites wordpress-blueprint-executor \
            --strict-suites wordpress-skill-candidate-eval \
            --allow-known-gaps

      - name: Run WordPress harness tests
        run: |
          python -m pytest \
            evals/harness/tests/test_invoke_claude_command.py \
            evals/harness/tests/test_workspace_lease.py \
            evals/harness/tests/test_runtime_image_provision.py \
            evals/harness/tests/test_wp_env_network_guard.py \
            evals/harness/tests/test_executor_repair_loop.py \
            evals/harness/tests/test_wordpress_runtime_smoke.py \
            evals/harness/tests/test_wordpress_artifact_oracle.py \
            evals/harness/tests/test_wordpress_blueprint_launch_readiness.py \
            evals/harness/tests/test_wordpress_executor_packet_oracle.py \
            evals/harness/tests/test_wordpress_exact_api_contract.py \
            evals/harness/tests/test_wordpress_executor_artifact_certifier.py \
            evals/harness/tests/test_wordpress_packet_materializer.py \
            evals/harness/tests/test_wordpress_high_risk_answer_keys.py \
            evals/harness/tests/test_wordpress_high_risk_saved_outputs.py \
            evals/harness/tests/test_wordpress_skill_output_contract.py \
            evals/harness/tests/test_answer_key_score.py \
            evals/harness/tests/test_pairwise_pilot.py \
            evals/harness/tests/test_wordpress_candidate_pilot_generation.py \
            evals/harness/tests/test_wp_api_lint.py \
            evals/harness/tests/test_wp_security_gate.py \
            -q
