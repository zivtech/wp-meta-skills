fixture: api-surfaces-risk
scoring_method: quality_weighted
max_score: 10
criteria:
  - id: wordpress_specificity
    weight: 2
    type: quality
    description: "Uses WordPress-native APIs, risks, and vocabulary rather than generic CMS or Drupal language."
  - id: severity_calibration
    weight: 2
    type: quality
    description: "Calibrates findings or risks to realistic consequence and avoids invented issues on clean controls."
  - id: remediation_specificity
    weight: 2
    type: quality
    description: "Provides concrete next steps, implementation handoffs, or verification commands rather than vague advice."
  - id: evidence_and_assumptions
    weight: 2
    type: quality
    description: "Separates observed evidence from assumptions and states what must be checked before execution."
  - id: provenance_and_safety
    weight: 1
    type: quality
    description: "Avoids secrets, unsafe production commands, unattributed reuse, and unsupported version claims."
  - id: false_positive_resistance
    weight: 1
    type: quality
    description: "Does not penalize sound WordPress choices merely because alternatives exist."
domain_signals:
  expected_wordpress_apis:
    - "register_rest_route"
    - "wp_interactivity_state"
    - "wp_interactivity_config"
    - "wp_schedule_event"
    - "Action Scheduler"
    - "admin-ajax.php"
    - "wp_register_ability"
    - "wp_abilities_api_init"
    - "input_schema"
    - "output_schema"
    - "execute_callback"
    - "permission_callback"
    - "wp_ai_client_prompt"
    - "wp_connectors_init"
    - "@wordpress/abilities"
    - "@wordpress/core-abilities"
    - "wordpress/mcp-adapter"
  must_detect:
    - "Unsupported API/version uncertainty"
    - "Public route mutates posts"
    - "Prompt and user identifier leakage"
    - "Abilities require input_schema/output_schema, execute_callback, and permission_callback"
    - "AI Client and Connectors require WordPress 7.0 support or a guarded dependency path"
  must_not_penalize_or_do:
    - "Build on unverified API availability"
    - "Treat transients as private storage"
    - "Skip capability checks because AI is involved"
discrimination_gate:
  required_delta: 0.2
  fallback: blind_pairwise_preference
