fixture: performance-subtle-real-issue
scoring_method: quality_weighted
max_score: 10
criteria:
  - id: wordpress_specificity
    weight: 2
    type: quality
    description: "Uses WordPress-native APIs, risks, and vocabulary rather than generic CMS or Drupal language."
  - id: severity_calibration
    weight: 2
    type: quality
    description: "Calibrates findings or risks to realistic consequence and avoids invented issues on clean controls."
  - id: remediation_specificity
    weight: 2
    type: quality
    description: "Provides concrete next steps, implementation handoffs, or verification commands rather than vague advice."
  - id: evidence_and_assumptions
    weight: 2
    type: quality
    description: "Separates observed evidence from assumptions and states what must be checked before execution."
  - id: provenance_and_safety
    weight: 1
    type: quality
    description: "Avoids secrets, unsafe production commands, unattributed reuse, and unsupported version claims."
  - id: false_positive_resistance
    weight: 1
    type: quality
    description: "Does not penalize sound WordPress choices merely because alternatives exist."
domain_signals:
  expected_wordpress_apis:
    - "WP_Query"
    - "meta_query"
    - "register_taxonomy"
    - "Query Monitor"
  must_detect:
    - "The two LIKE comparisons on unindexed postmeta (city, region) are the real bottleneck at scale"
    - "Recommends taxonomy or an indexed column over meta_query LIKE for filterable facets"
    - "Affirms the sound patterns (transient cache, conditional enqueue, core responsive images) and measures with Query Monitor"
  must_not_penalize_or_do:
    - "Flag the transient-cached external call as a problem"
    - "Recommend disabling core responsive images"
    - "Call no_found_rows true a bug or invent a bottleneck in the conditional enqueue"
discrimination_gate:
  required_delta: 0.2
  fallback: blind_pairwise_preference
