skill:
  name: wordpress-plugin-executor
  type: executor
  status: experimental-live-certified-smoke

fixtures:
  directory: ./fixtures
  count: 2
  pattern: "*.md"
  metadata_suffix: ".metadata.yaml"

rubrics:
  directory: ./rubrics
  scoring_method: quality_weighted

baselines:
  directory: ./baselines
  conditions:
    - baseline-zero-shot
    - baseline-few-shot

evaluation:
  status: smoke_live_certified_repeated
  full_run_status: blocked_until_runtime_certification_and_test_critic_review

invocation:
  model: sonnet
  effort: low
  baseline_provider: codex
  baseline_model_policy: newest-chatgpt-level-at-run-time
  baseline_model: gpt-5.5
  baseline_effort: medium
  note: "Skill-agent invocation still uses the local Claude CLI because the WordPress skill packages are Claude-agent surfaces. Baseline lanes default to the newest ChatGPT-level local Codex CLI (`codex exec --model gpt-5.5`) so Sonnet is no longer the default baseline."

output_contract_oracle:
  type: deterministic_wordpress_skill_output_contract
  command: "python3 evals/harness/validate_wordpress_skill_output.py --skill wordpress-plugin-executor --output <candidate-output.md>"
  status: available

oracle:
  type: deterministic_executor_packet_contract
  command: "python3 evals/harness/validate_wordpress_executor_packet.py --executor plugin --packet <candidate-output.md>"
  status: available

materializer:
  type: deterministic_executor_packet_materializer
  command: "python3 evals/harness/materialize_wordpress_executor_packet.py --executor plugin --packet <candidate-output.md> --out-dir <generated-plugin-dir>"
  status: available

certifier:
  type: deterministic_executor_artifact_certification
  command: "python3 evals/harness/certify_wordpress_executor_artifact.py --executor plugin --packet <candidate-output.md> --out-dir <generated-plugin-dir> --result-dir <result-dir> --overwrite"
  status: available

artifact_oracle:
  type: deterministic_wordpress_artifact_static
  command: "python3 evals/harness/validate_wordpress_artifact.py --artifact-type plugin --path <generated-plugin-dir>"
  status: available
  runtime_command: "python3 evals/harness/run_wordpress_runtime_smoke.py --artifact-path <generated-plugin-dir>/<plugin-slug> --phpunit-smoke --provision-full-profile --write --run-id generated-plugin-phpunit-full-profile-YYYYMMDD --timeout-sec 300"
  mcp_adapter_runtime_command: "python3 evals/harness/run_wordpress_runtime_smoke.py --artifact-path <generated-plugin-dir>/<plugin-slug> --ability-name vendor/ability-name --mcp-adapter-smoke --mcp-adapter-execute-args-json '{\"marker\":\"Runtime MCP smoke\"}' --mcp-adapter-expected-output \"Runtime MCP smoke\" --provision-full-profile --write --run-id generated-mcp-adapter-full-profile-YYYYMMDD --timeout-sec 300"
  ai_client_runtime_command: "python3 evals/harness/run_wordpress_runtime_smoke.py --workdir /tmp/wp-ai-client-runtime-smoke-YYYYMMDD --artifact-path <generated-plugin-dir>/<plugin-slug> --ai-client-smoke --ai-client-provider-id acme-ai-client-smoke --ai-client-model-id acme-deterministic-text --ai-client-helper-function 'AcmeAIClientSmoke\\generate_summary' --ai-client-prompt \"Runtime AI Client smoke\" --ai-client-expected-output \"AI Client smoke: deterministic provider response\" --provision-full-profile --write --run-id generated-ai-client-provider-full-profile-YYYYMMDD --timeout-sec 300"
  runtime_status: environment_dependent
