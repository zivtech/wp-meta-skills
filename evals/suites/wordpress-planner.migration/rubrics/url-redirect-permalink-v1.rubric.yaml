fixture: url-redirect-permalink-v1
skill_under_test: wordpress-planner.migration
max_score: 10
criteria:
  - id: contract_compliance
    weight: 2
    description: Output uses the exact wordpress-migration-planner headings and includes acceptance criteria plus open questions.
  - id: redirect_strategy
    weight: 3
    description: Defines redirect-map generation, canonical URL decisions, query-string handling, media URL handling, chain prevention, and 404 sampling.
  - id: permalink_and_wordpress_surfaces
    weight: 2
    description: Separates target permalink design from redirect implementation and names exact WP-CLI/permalink verification surfaces.
  - id: validation_plan
    weight: 2
    description: Requires crawl comparison, redirect import/export verification, chain/loop checks, and stakeholder acceptance thresholds.
  - id: calibration
    weight: 1
    description: Avoids claiming SEO/search-equity preservation without validated redirect evidence.
domain_signals:
  expected_wordpress_apis:
    - "wp rewrite flush"
    - "wp search-replace"
    - "wp option get permalink_structure"
    - "WP-CLI"
  must_detect:
    - "redirect acceptance criteria are missing"
    - "SEO metadata export is pending"
    - "permalink verification is distinct from redirect import"
    - "crawl comparison and 404 sampling are required"
  must_not_claim:
    - "search equity is preserved"
    - "all legacy aliases are known"
    - "redirects are done without crawl evidence"
